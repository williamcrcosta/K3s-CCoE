apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zabbix
  namespace: zabbix
spec:
  ingressClassName: nginx
  rules:
  - host: zabbix.wcrpc.lan
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: zabbix-zabbix-web
            port:
              number: 80
  tls:
  - hosts:
    - zabbix.wcrpc.lan
    secretName: wcrpc-tls
