apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-dashboard
  namespace: platform-argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/williamcrcosta/K3s-CCoE.git
    targetRevision: main
    path: apps/kubernetes-dashboard
  destination:
    server: https://kubernetes.default.svc
    namespace: kubernetes-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
