apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-homelab
  namespace: platform-argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/williamcrcosta/K3s-CCoE.git
    targetRevision: main
    path: clusters/homelab
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true